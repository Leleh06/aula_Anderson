<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="atv3.js" defer></script>
    <link rel="stylesheet" href="atv3.css">
    <title> Filtro de Produtos em Tempo Real</title>
</head>

<body>
    <input type="text" id="campoBusca" placeholder="Buscar produto...">

    <div class="galeria">
        <div class="card-produto">
            <h3 class="titulo-produto">Placa de Vídeo RTX 4070</h3>
            <p>R$ 3.999,00</p>
        </div>

        <div class="card-produto">
            <h3 class="titulo-produto">Processador Ryzen 7</h3>
            <p>R$ 1.899,00</p>
        </div>

        <div class="card-produto">
            <h3 class="titulo-produto">Memória RAM 16GB</h3>
            <p>R$ 349,00</p>
        </div>

        <div class="card-produto">
            <h3 class="titulo-produto">SSD NVMe 1TB</h3>
            <p>R$ 499,00</p>
        </div>
    </div>

</body>

</html>
